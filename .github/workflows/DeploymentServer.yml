# Nombre del workflow
name: Despliegue Continuo a Servidor

# Activador: se ejecuta cada vez que hay un push a la rama 'main'
on:
  push:
    branches: [main]

# Tareas a ejecutar
jobs:
  deploy:
    # Usa una máquina virtual de Ubuntu proporcionada por GitHub
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - name: Conectar al servidor y desplegar
        # Usamos una acción pre-hecha para facilitar la conexión SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navega al directorio del proyecto
            cd ~/home/landing-econecta

            # 2. Obtén el código más reciente desde GitHub
            git pull origin main

            # 3. Activa BuildKit para builds más rápidos
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            # 4. Reconstruye y reinicia los contenedores en segundo plano
            docker-compose up --build -d

            # 5. Limpia imágenes de Docker viejas para liberar espacio
            docker image prune -f

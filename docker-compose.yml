version: "3.8"

services:
  # El servicio de tu aplicación
  app:
    build: . # Construye la imagen usando el Dockerfile en la carpeta actual
    restart: always
    # No es necesario exponer el puerto 3000 al exterior,
    # ya que Nginx se comunicará con él internamente.

  # El servicio del reverse proxy
  nginx:
    image: nginx:latest # Usa la imagen oficial de Nginx
    restart: always
    ports:
      - "80:80" # Mapea el puerto 80 del servidor al puerto 80 del contenedor
      - "443:443" # Mapea el puerto 443 para HTTPS
    volumes:
      # Monta nuestro archivo de configuración dentro del contenedor de Nginx
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app # Le dice a Nginx que espere a que el contenedor 'app' inicie

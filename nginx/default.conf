# -----------------------------------------------------------
# BLOQUE 1: HTTP (Puerto 80)
# - Maneja la validación de Certbot.
# - Redirige todo el tráfico HTTP a HTTPS (443).
# -----------------------------------------------------------
server {
    listen 80;
    listen [::]:80; # Soporte para IPv6
    server_name econecta.io www.econecta.io;

    # Directorio para la validación de certificados de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirección permanente (301) de HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------
# BLOQUE 2: HTTPS (Puerto 443)
# - Sirve la web con los certificados SSL.
# - Actúa como reverse proxy para su aplicación Next.js.
# -----------------------------------------------------------
server {
    # Usar 'ssl' y 'http2' separadamente para evitar la advertencia de depreciación
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name econecta.io www.econecta.io;

    # Rutas a los certificados de Let's Encrypt (montados desde Certbot)
    ssl_certificate /etc/letsencrypt/live/econecta.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/econecta.io/privkey.pem;

    # Parámetros SSL estándar
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_ciphers 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-RC4-SHA:ECDHE-RSA-DES-CBC3-SHA:AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-SHA384:AES128-SHA256:AES256-SHA:AES128-SHA:RC4-SHA:DES-CBC3-SHA:!aNULL:!eNULL:!low:!MD5:!EXP:!PSK:!SRP:!DSS';
    ssl_prefer_server_ciphers on;

    # Cabecera de seguridad (HSTS - HTTP Strict Transport Security)
    # Requerirá HTTPS para futuras conexiones. Descomente tras prueba inicial.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reverse Proxy a su aplicación Next.js (el servicio 'app' en docker-compose)
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Importante: Usar 'https' para Next.js sepa que está sirviendo bajo SSL
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
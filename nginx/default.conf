server {
    listen 80;
    listen [::]:80;
    server_name econecta.io www.econecta.io;

    # Clave para que Certbot pueda validar
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo el tráfico HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name econecta.io www.econecta.io;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/econecta.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/econecta.io/privkey.pem;

    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Configuración adicional de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy hacia la aplicación Next.js
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
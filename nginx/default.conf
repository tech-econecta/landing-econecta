# Servidor HTTP en puerto 80 para validación de certificados Let's Encrypt
server {
    listen 80;
    server_name econecta.io www.econecta.io;

    # Ubicación para validación de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS en puerto 3000
    location / {
        return 301 https://$host:3000$request_uri;
    }
}

# Servidor HTTPS en puerto 3000 con SSL
server {
    listen 3000 ssl http2;
    server_name econecta.io www.econecta.io;

    # Certificados SSL de Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/econecta.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/econecta.io/privkey.pem;

    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    location / {
        # Proxy a la aplicación Next.js
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
server {
    listen 80;

    server_name econecta.io www.econecta.io;

    location / {
        # La magia está aquí:
        # En lugar de 'localhost', apuntamos al nombre del servicio de la app
        # que definiremos en docker-compose.yml ('app').
        # Docker se encarga de resolver la IP interna.
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}